<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Video Frame</title>
  <style>
    body {
      margin: 0;
      background: #0b1220;
    }

    video {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #0b1220;
    }
  </style>
</head>
<body>
  <video src="media-test.mp4" autoplay muted loop playsinline></video>
</body>
</html>
