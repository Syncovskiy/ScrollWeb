<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Iframe Media Sync Test</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      color: #111827;
      background: #f7f8fb;
    }

    .video-shell {
      position: sticky;
      top: 0;
      z-index: 1;
      height: 240px;
      background: #0b1220;
      border-bottom: 1px solid #d7dee8;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: 0;
    }

    main {
      max-width: 820px;
      margin: 0 auto;
      padding: 48px 24px 80px;
    }

    section {
      min-height: 680px;
      display: grid;
      align-content: center;
      border-bottom: 1px solid #d7dee8;
    }

    h1,
    h2,
    p {
      margin: 0;
    }

    h1 {
      font-size: 44px;
    }

    h2 {
      font-size: 34px;
    }

    p {
      margin-top: 12px;
      font-size: 20px;
      line-height: 1.55;
    }
  </style>
</head>
<body>
  <div class="video-shell">
    <iframe src="video-frame.html" title="Media frame"></iframe>
  </div>
  <main>
    <section>
      <h1>Iframe media sync test</h1>
      <p>The red block is inside an MP4 video loaded from an iframe.</p>
    </section>
    <section>
      <h2>Scroll section</h2>
      <p>The iframe stays visible while the capture loop scrolls this page.</p>
    </section>
    <section>
      <h2>Final section</h2>
      <p>The video frame should move at video speed, not render speed.</p>
    </section>
  </main>
</body>
</html>
